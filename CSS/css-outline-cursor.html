<!DOCTYPE html>
<html lang="en">
    <head>
        <title>CSS Cursor Outline Dimension</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        /*Dimensions*/
        .box {
            width: 250px;
            height: 120px;
            background-color: lightblue;
            padding: 10px;
            margin-bottom: 20px;
        }

        /*OUTLINE*/
        /*input selector applies to all elements. Here focus is pseudo-class. When an elements is focused , then input:focus is applied*/
        input {
            padding: 10px;
            outline: 2px solid blue;
            margin-bottom: 20px;
        }
        input:focus {
            outline: 3px solid red;
        }

        /*Cursor*/
        /*Cursor property changes the mouse pointer*/
        button {
            padding: 10px 15px;
            margin-right: 10px;
        }

        .pointer{
            cursor: pointer;
        }
        .text {
            cursor:text;
        }
        .not-allowed{
            cursor:not-allowed;
        }
        
    </style>
    </head>
    <body>
        <h1>DIMENSION Example</h1>
        <div class="box">
            This box has fixed weight and height.
        </div>

        <h1>OUTLINE Example</h1>
        <input type="text" placeholder="Click here to see outline">

        <h1>CURSOR Examples</h1>
        <button class="pointer">Pointer</button>
        <button class="text">Text (I beam)</button>
        <button class="not-allowed">Not Allowed</button>

    </body>
</html>
