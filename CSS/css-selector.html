<!DOCTYPE HTML>
<html>
    <head>
        <style>
            #para1 {
                text-align: center;
                color:aqua;
            }

            /*A class is declared by a dot and called using class*/
            .center {
                text-align:center;
                color:red;
            }
        </style>
    </head>
    <body>
        <p id="para1">Hello World!</p>
        <p>This paragraph is not affected by the style</p>

        <h1 class="center">Red and center-alinged heading using class selector</h1>
        <p class="center">Red and center-alinged paragraph using class selector</p>
    </body>
</html>
