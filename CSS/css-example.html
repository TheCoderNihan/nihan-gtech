<!DOCTYPE HTML>
<html>
    <head>
        <style>
            /*This puts background color blue in the whole screen*/
            body {
                background-color: lightblue;
            }   
            h1 {
                color:white;
                text-align: center;
            }
            p {
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                font-size: 20px;
            }
            h2 {
                color: red;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <!--Style is given in style tag and content in body tag-->
        <h1>My first css example</h1>
        <p>css stands for cascading style sheets</p>
        <p>Style given using font-family and font-size</p>
        <h2>Hello World</h2>
        <h2>These paragraphs are styled using internal css</h2>
    </body>
</html>
