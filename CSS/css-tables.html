<!DOCTYPE html>
<html>
    <head>
        <title>CSS Tables</title>
    <style>
        body { 
            background-color: yellowgreen;
        }
        table,td,th {
            border: 1px solid;
            padding: 10px;
        }
        /*border-collapse merges the nearby borders in a table to a single border*/
        table {
            border-collapse: collapse;
        }
    </style>
    </head>
    <body>
        <h2 style="text-align: center;">The padding property</h2>
        <p style="text-align: center;">Adds space between the border and the content inside the table</p>

        <table>
            <tr>
                <th>State</th>
                <th>Capital</th>
            </tr>
            <tr>
                <td>Kerala</td>
                <td>Thiruvantapuram</td>
            </tr>
            <tr>
                <td>Tamil Nadu</td>
                <td>Chennai</td>
            </tr>
            <tr>
                <td>Karnataka</td>
                <td>Bengaluru</td>
            </tr>
            <tr>
                <td>Telengana</td>
                <td>Hyderabad</td>
            </tr>
        </table>
    </body>
</html>
