<!DOCTYPE html>
<html>
    <head>
        <title>Font Awesome Icons</title>
        <!--Makes the website responsive on mobile devices-->
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <!--Get codes of fonts at fontawesome.com-->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

        <!--style tag for styling links-->
        <style>
            a {
                color: hotpink;
                background-color: yellow;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <h1>Some icons in Font Awesome library</h1>
        <p>Paste the link from the website to see the icons</p>
        <i class="fa-solid fa-cloud"></i> <br>
        <i class="fa-solid fa-car"></i> <br>
        <i class="fa-brands fa-android"></i> <br>

        <h1>Styled font awesome icons (size and color)</h1>
        <i class="fa-solid fa-cloud" style="font-size: 24px;"></i> <br>
        <i class="fa-solid fa-cloud" style="font-size: 60px;color:aqua;"></i> <br>
        <i class="fa-solid fa-car" style="font-size: 200px;color: red;"></i> <br>

        <h1>For styling a link</h1>
        <p><a href="default.asp" target="_blank">This is a link</a></p>
    </body>
</html>
