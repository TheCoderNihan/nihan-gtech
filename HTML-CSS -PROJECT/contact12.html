<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Contact Us</title>
        <link rel="stylesheet" href="contact12.css">
    </head>
    <body>
        <header class="header">
            <h1>My Demo Website</h1>
      </header>

      <main class="content">
        <p class="introduction">
            Fill out the form below and we will reach you.
        </p>

        <form>
            <label>Full Name *</label> <br>
            <input type="text" placeholder="Enter your name" required> <br><br>

            <label>Email *</label> <br>
            <input type="email" placeholder="Enter your email" required> <br><br>

            <label>Phone Number *</label> <br>
            <input type="number" placeholder="Enter your phone number" required> <br><br>

            <input type="submit" value="Send Message">

        </form>
      </main>
      
        <footer class="footer">
            <p>&copy; My Demo Website</p>
        </footer>
    </body>
</html>
